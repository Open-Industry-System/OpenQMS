[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_untyped_calls = False
check_untyped_defs = True

# Baseline: allow missing imports for now (third-party stubs incomplete)
ignore_missing_imports = True

# Don't warn about unused `# type: ignore` comments yet — we'll
# enable this once the baseline is clean.
# warn_unused_ignores = True

[module-mypy]
# Third-party modules without stubs
[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-neo4j.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True