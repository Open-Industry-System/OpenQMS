version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms_dev_2026
      POSTGRES_DB: qms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://qms:qms_dev_2026@db:5432/qms
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: openqms-local-dev-2026-jwt-signing-key
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8000
      VITE_API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/openqms2026
      NEO4J_server_memory_pagecache_size: 128M
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p openqms2026 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  graph-worker:
    build: ./backend
    command: python -m app.services.graph_sync_worker
    depends_on:
      neo4j:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: openqms-local-dev-2026-jwt-signing-key
      DATABASE_URL: postgresql+asyncpg://qms:qms_dev_2026@db:5432/qms
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: openqms2026

volumes:
  pgdata:
  neo4j_data:
